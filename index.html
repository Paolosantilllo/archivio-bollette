<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archivio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="headerTop">

<h1>Archivio</h1>

<div class="headerActions">

<button id="backupBtn">⬆️</button>

<button id="restoreBtn">⬇️</button>

<input type="file" id="restoreInput" accept=".json" hidden>

</div>

</div>

<input type="text" id="search" placeholder="Cerca">

</header>

<main>

<div class="topbar">

<button id="backBtn" class="hidden">←</button>

<div id="path">Home</div>

</div>

<ul id="folders" class="folderGrid"></ul>

</main>

<div class="floatingButtons">

<button id="addFolder">📁</button>

<button id="addFile" class="hidden">＋</button>

<input type="file" id="fileInput" accept="application/pdf,image/*" hidden>

</div>

<!-- ACTION SHEET -->

<div id="actionSheet">

<div id="actionSheetBackdrop"></div>

<div id="actionSheetPanel">

<button class="actionBtn" id="renameAction">Rinomina</button>

<button class="actionBtn" id="moveAction">Sposta</button>

<button class="actionBtn deleteAction" id="deleteAction">Elimina</button>

<div class="cancelWrap">

<button class="cancelBtn" id="cancelAction">Annulla</button>

</div>

</div>

</div>

<!-- PDF VIEWER -->

<div id="pdfViewer" class="hidden">

<div id="pdfViewerHeader">

<button id="closePdfBtn">Chiudi</button>

<div id="pdfTitle"></div>

<div class="pdfActions">

<button id="renamePdfBtn">Rinomina</button>

<button id="movePdfBtn">Sposta</button>

<button id="deletePdfBtn">Elimina</button>

</div>

</div>

<iframe id="pdfFrame"></iframe>

</div>

<!-- DEADLINE EDITOR -->

<div id="deadlineEditor" class="hidden">

<div id="deadlineEditorBackdrop"></div>

<div id="deadlineEditorPanel">

<div class="deadlineHeader">

<h3>Scadenze</h3>

<button id="closeDeadlineEditorBtn">✕</button>

</div>

<div class="deadlineForm">

<label>Nome documento</label>

<input id="deadlineName" placeholder="es. Patente">

<label>Data scadenza</label>

<input type="date" id="deadlineDate">

<label>Ripetizione</label>

<select id="repeatType">

<option value="none">Nessuna</option>

<option value="monthly">Ogni mese</option>

<option value="bimonthly">Ogni 2 mesi</option>

<option value="quarterly">Ogni 3 mesi</option>

<option value="yearly">Ogni anno</option>

<option value="custom">Personalizzata</option>

</select>

<div id="customRepeatBox" class="hidden">

<label>Ogni quanti anni?</label>

<input
type="number"
id="customRepeatYears"
min="1"
max="20"
placeholder="es. 10"
/>

</div>

</div>

<div id="deadlineListBox">

<div class="deadlineEmpty">

Nessuna scadenza

</div>

</div>

<div class="deadlineButtons">

<button id="saveDeadlineBtn" class="primaryBtn">

Salva

</button>

<button id="deleteDeadlineBtn" class="dangerBtn">

Elimina

</button>

<button id="openDeadlineEditorBtn" class="secondaryBtn">

Gestisci scadenze

</button>

</div>

</div>

</div>

<!-- RENAME MODAL -->

<div id="renameModal" class="hidden">

<div id="renameBackdrop"></div>

<div id="renamePanel">

<h3>Rinomina</h3>

<input id="renameInput">

<div class="renameButtons">

<button id="renameCancel">Annulla</button>

<button id="renameConfirm">OK</button>

</div>

</div>

</div>

<!-- MOVE MODAL -->

<div id="moveModal" class="hidden">

<div id="moveBackdrop"></div>

<div id="movePanel">

<div class="moveHeader">

<h3>Sposta</h3>

<button id="closeMoveBtn">✕</button>

</div>

<div id="moveCurrentFile"></div>

<div id="moveFolderList"></div>

</div>

</div>

<!-- CREATE FOLDER -->

<div id="folderModal" class="hidden">

<div id="folderBackdrop"></div>

<div id="folderPanel">

<h3>Nuova cartella</h3>

<input id="folderNameInput">

<div class="folderButtons">

<button id="folderCancelBtn">Annulla</button>

<button id="folderConfirmBtn">Crea</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
