<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Archivio Bollette</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bollette">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="headerTop">

<h1>Archivio</h1>

<div class="headerActions">

<button
id="viewToggleBtn"
title="Cambia vista"
aria-label="Cambia vista">

🔲

</button>

<button
id="backupBtn"
title="Backup"
aria-label="Backup">

💾

</button>

<button
id="restoreBtn"
title="Ripristina"
aria-label="Ripristina">

📥

</button>

</div>
</div>

<input
type="text"
id="search"
placeholder="🔍 Cerca documento">

</header>

<main>

<div class="topbar">

<button
id="backBtn"
class="hidden">

←

</button>

<div id="path">

Home

</div>

</div>

<ul
id="folders"
class="folderGrid">

</ul>

</main>

<div class="floatingButtons">

<button id="addFolder">

📁

</button>

<button
id="addFile"
class="hidden">

📄

</button>

</div>

<input
type="file"
id="fileInput"
accept="application/pdf,image/*"
hidden>

<input
type="file"
id="restoreInput"
accept="application/json"
hidden>

<!-- ACTION SHEET -->

<div id="actionSheet">

<div id="actionSheetBackdrop"></div>

<div id="actionSheetPanel">

<button
id="renameAction"
class="actionBtn">

Rinomina

</button>

<button
id="moveAction"
class="actionBtn">

Sposta

</button>

<button
id="deleteAction"
class="actionBtn deleteAction">

Elimina

</button>

<div class="cancelWrap">

<button
id="cancelAction"
class="cancelBtn">

Annulla

</button>

</div>

</div>

</div>

<!-- PDF VIEWER -->

<div
id="pdfViewer"
class="hidden">

<div id="pdfViewerHeader">

<button id="closePdfBtn">

Chiudi

</button>

<div id="pdfTitle">

PDF

</div>

<div class="pdfActions">

<button id="renamePdfBtn">

Rinomina

</button>

<button id="movePdfBtn">

Sposta

</button>

<button id="deletePdfBtn">

Elimina

</button>

</div>

</div>

<iframe
id="pdfFrame">

</iframe>

</div>

<!-- EDITOR SCADENZE -->

<div
id="deadlineEditor"
class="hidden">

<div id="deadlineEditorBackdrop"></div>

<div id="deadlineEditorPanel">

<div class="deadlineHeader">

<h3>Modifica cartella</h3>

<button id="closeDeadlineEditorBtn">

✕

</button>

</div>

<div class="deadlineForm">

<label>Nome cartella</label>

<input
type="text"
id="deadlineFolderNameInput">

<label>Nome scadenza</label>

<input
type="text"
id="deadlineLabelInput">

<label>Prima scadenza</label>

<input
type="date"
id="deadlineFirstDateInput">

<label>Ripetizione</label>

<select id="deadlineIntervalSelect">

<option value="1">Ogni 1 mese</option>
<option value="2">Ogni 2 mesi</option>
<option value="3">Ogni 3 mesi</option>
<option value="4">Ogni 4 mesi</option>
<option value="6">Ogni 6 mesi</option>
<option value="12">Ogni 12 mesi</option>
<option value="120">Ogni 10 anni</option>

</select>

<label>Prefisso PDF</label>

<input
type="text"
id="deadlinePrefixInput">

</div>

<div id="deadlineListBox"></div>

<div class="deadlineButtons">

<button
id="saveDeadlineBtn"
class="primaryBtn">

Salva

</button>

<button
id="replaceDeadlinesBtn"
class="secondaryBtn">

Sostituisci scadenza

</button>

<button
id="clearDeadlinesBtn"
class="dangerBtn">

Elimina scadenze

</button>

</div>

</div>

</div>

<!-- RENAME -->

<div
id="renameModal"
class="hidden">

<div id="renameBackdrop"></div>

<div id="renamePanel">

<h3>Rinomina</h3>

<input id="renameInput">

<div class="renameButtons">

<button id="renameCancel">

Annulla

</button>

<button id="renameConfirm">

OK

</button>

</div>

</div>

</div>

<!-- MOVE -->

<div
id="moveModal"
class="hidden">

<div id="moveBackdrop"></div>

<div id="movePanel">

<div class="moveHeader">

<h3>Sposta</h3>

<button id="closeMoveBtn">

✕

</button>

</div>

<div id="moveCurrentFile"></div>

<div id="moveFolderList"></div>

</div>

</div>

<!-- NUOVA CARTELLA -->

<div
id="folderModal"
class="hidden">

<div id="folderBackdrop"></div>

<div id="folderPanel">

<h3>Nuova cartella</h3>

<input
type="text"
id="folderNameInput"
placeholder="Nome cartella">

<div class="folderButtons">

<button id="folderCancelBtn">

Annulla

</button>

<button id="folderConfirmBtn">

Salva

</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
