<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Archivio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="headerTop">

<h1>Archivio</h1>

<div class="headerActions">

<button
id="backupBtn"
title="Backup"
aria-label="Backup">

💾

</button>

<button
id="restoreBtn"
title="Ripristina"
aria-label="Ripristina">

📥

</button>

<input
type="file"
id="restoreInput"
accept=".json"
hidden>

</div>

</div>

<input
type="text"
id="search"
placeholder="Cerca documenti">

</header>

<main>

<div class="topbar">

<button
id="backBtn"
class="hidden">

←

</button>

<div id="path">

Home

</div>

</div>

<ul
id="folders"
class="folderGrid">

</ul>

</main>

<div class="floatingButtons">

<button id="addFolder">

📁

</button>

<button
id="addFile"
class="hidden">

＋

</button>

<input
type="file"
id="fileInput"
accept="application/pdf,image/*"
hidden>

</div>

<!-- ACTION SHEET -->

<div id="actionSheet">

<div id="actionSheetBackdrop"></div>

<div id="actionSheetPanel">

<button
class="actionBtn"
id="renameAction">

Rinomina

</button>

<button
class="actionBtn"
id="moveAction">

Sposta

</button>

<button
class="actionBtn deleteAction"
id="deleteAction">

Elimina

</button>

<div class="cancelWrap">

<button
class="cancelBtn"
id="cancelAction">

Annulla

</button>

</div>

</div>

</div>

<!-- PDF VIEWER -->

<div
id="pdfViewer"
class="hidden">

<div id="pdfViewerHeader">

<button id="closePdfBtn">

Chiudi

</button>

<div id="pdfTitle"></div>

<div class="pdfActions">

<button id="renamePdfBtn">

Rinomina

</button>

<button id="movePdfBtn">

Sposta

</button>

<button id="deletePdfBtn">

Elimina

</button>

</div>

</div>

<iframe id="pdfFrame"></iframe>

</div>

<!-- RENAME -->

<div
id="renameModal"
class="hidden">

<div id="renameBackdrop"></div>

<div id="renamePanel">

<h3>Rinomina</h3>

<input id="renameInput">

<div class="renameButtons">

<button id="renameCancel">

Annulla

</button>

<button id="renameConfirm">

OK

</button>

</div>

</div>

</div>

<!-- MOVE -->

<div
id="moveModal"
class="hidden">

<div id="moveBackdrop"></div>

<div id="movePanel">

<div class="moveHeader">

<h3>Sposta</h3>

<button id="closeMoveBtn">

✕

</button>

</div>

<div id="moveCurrentFile"></div>

<div id="moveFolderList"></div>

</div>

</div>

<!-- NUOVA CARTELLA -->

<div
id="folderModal"
class="hidden">

<div id="folderBackdrop"></div>

<div id="folderPanel">

<h3>Nuova cartella</h3>

<input
id="folderNameInput"
placeholder="Nome cartella">

<div class="folderButtons">

<button id="folderCancelBtn">

Annulla

</button>

<button id="folderConfirmBtn">

Crea

</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
