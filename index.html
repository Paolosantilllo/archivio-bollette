<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archivio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<button id="backBtn">◀</button>

<div id="path">Home</div>

</header>


<input id="search" placeholder="Cerca...">


<ul id="folders"></ul>



<div class="bottomBar">

<button id="addFolder">+</button>

<button id="addFile">PDF</button>

<input type="file" id="fileInput" accept=".pdf,image/*" hidden>

</div>



<!-- ACTION SHEET -->

<div id="actionSheetBackdrop"></div>

<div id="actionSheet">

<button id="moveActionBtn">Sposta</button>

<button id="editActionBtn">Modifica</button>

<button id="deleteActionBtn">Elimina</button>

<button id="cancelActionBtn">Annulla</button>

</div>



<!-- PDF VIEWER -->

<div id="pdfViewer" class="hidden">

<div class="pdfHeader">

<button id="closePdfBtn">Chiudi</button>

<div id="pdfTitle">PDF</div>

<div class="pdfActions">

<button id="sharePdfBtn">Condividi</button>

<button id="printPdfBtn">Stampa</button>

</div>

</div>

<iframe id="pdfFrame"></iframe>

</div>



<!-- MODIFICA SCADENZE -->

<div id="deadlineEditorBackdrop"></div>

<div id="deadlineEditor" class="hidden">

<h3>Modifica cartella</h3>

<input id="deadlineFolderNameInput" placeholder="Nome cartella">

<input id="deadlineLabelInput" placeholder="Nome scadenza">

<input id="deadlineFirstDateInput" type="date">

<select id="deadlineIntervalSelect">

<option value="1">Mensile</option>

<option value="2">Bimestrale</option>

<option value="3">Trimestrale</option>

<option value="6">Semestrale</option>

<option value="12">Annuale</option>

</select>

<input id="deadlinePrefixInput" placeholder="Prefisso PDF">

<div id="deadlineListBox"></div>

<button id="saveDeadlineBtn">Salva</button>

<button id="replaceDeadlinesBtn">Sostituisci</button>

<button id="clearDeadlinesBtn">Cancella scadenze</button>

<button id="closeDeadlineEditorBtn">Chiudi</button>

</div>



<!-- RINOMINA PDF -->

<div id="renameBackdrop"></div>

<div id="renameModal" class="hidden">

<input id="renameInput">

<button id="renameConfirm">Salva</button>

<button id="renameCancel">Annulla</button>

</div>



<!-- SPOSTA PDF -->

<div id="moveBackdrop"></div>

<div id="moveModal" class="hidden">

<div id="moveCurrentFile"></div>

<div id="moveFolderList"></div>

<button id="closeMoveBtn">Chiudi</button>

</div>



<!-- NUOVA CARTELLA -->

<div id="folderModal" class="hidden">

<div id="folderBackdrop"></div>

<div id="folderPanel">

<h3>Nuova cartella</h3>

<input type="text" id="folderNameInput" placeholder="Nome cartella">

<div class="folderButtons">

<button id="folderConfirmBtn">Salva</button>

<button id="folderCancelBtn">Annulla</button>

</div>

</div>

</div>



<script src="app.js"></script>

</body>
</html>
