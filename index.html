<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Archivio Bollette</title>

  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bollette">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Archivio</h1>
    <input type="text" id="search" placeholder="🔍 Cerca documento o cartella">
  </header>

  <main>
    <div class="topbar">
      <button id="backBtn">⬅️ Indietro</button>
      <div id="path">Home</div>
    </div>

    <ul id="folders"></ul>
  </main>

  <div class="floatingButtons">
    <button id="addYear" title="Aggiungi anno">🗓️</button>
    <button id="addFile" title="Aggiungi documento">📄</button>
    <button id="addFolder" title="Aggiungi cartella">＋</button>
  </div>

  <input type="file" id="fileInput" accept=".pdf,application/pdf" hidden>

    <input type="file" id="fileInput" accept=".pdf,application/pdf" hidden>

  <div id="actionSheet">
    <div id="actionSheetBackdrop"></div>

    <div id="actionSheetPanel">
  <button id="editActionBtn" class="actionBtn">Modifica</button>
<button id="deleteActionBtn" class="actionBtn deleteAction">Elimina</button>
  <div class="cancelWrap">
    <button id="cancelActionBtn" class="cancelBtn">Annulla</button>
  </div>
</div>
  </div>

  <div id="pdfViewer" class="hidden">
  <div id="pdfViewerHeader">
    <button id="closePdfBtn">Chiudi</button>
    <span id="pdfTitle">PDF</span>
  </div>
  <iframe id="pdfFrame"></iframe>
</div>
  <div id="iconPicker" class="hidden">
  <div id="iconPickerBackdrop"></div>

  <div id="iconPickerPanel">
    <div class="iconPickerHeader">
      <h3>Nuova cartella</h3>
      <button id="closeIconPickerBtn">✕</button>
    </div>

    <input type="text" id="newFolderName" placeholder="Nome cartella">

    <div id="iconGrid">
      <button class="iconChoice" data-icon="🏠">🏠</button>
      <button class="iconChoice" data-icon="🚗">🚗</button>
      <button class="iconChoice" data-icon="⚡">⚡</button>
      <button class="iconChoice" data-icon="🔥">🔥</button>
      <button class="iconChoice" data-icon="💧">💧</button>
      <button class="iconChoice" data-icon="🧾">🧾</button>
      <button class="iconChoice" data-icon="⚽">⚽</button>
      <button class="iconChoice" data-icon="📄">📄</button>
      <button class="iconChoice" data-icon="💳">💳</button>
      <button class="iconChoice" data-icon="📦">📦</button>
      <button class="iconChoice" data-icon="🔧">🔧</button>
      <button class="iconChoice" data-icon="⭐">⭐</button>
    </div>

    <button id="createFolderConfirmBtn">Crea cartella</button>
  </div>
</div>
 <div id="deadlineEditor" class="hidden">
  <div id="deadlineEditorBackdrop"></div>

  <div id="deadlineEditorPanel">
    <div class="deadlineHeader">
      <h3>Scadenze</h3>
      <button id="closeDeadlineEditorBtn">✕</button>
    </div>

    <div class="deadlineForm">
  <label>Nome cartella</label>
  <input type="text" id="deadlineFolderNameInput" placeholder="Es. Internet">

  <label>Nome scadenza</label>
  <input type="text" id="deadlineLabelInput" placeholder="Es. Internet">
      <label>Prima scadenza</label>
      <input type="date" id="deadlineFirstDateInput">

      <label>Ripetizione</label>
      <select id="deadlineIntervalSelect">
        <option value="1">Ogni 1 mese</option>
        <option value="2">Ogni 2 mesi</option>
        <option value="3">Ogni 3 mesi</option>
        <option value="4">Ogni 4 mesi</option>
        <option value="6">Ogni 6 mesi</option>
        <option value="12">Ogni 12 mesi</option>
      </select>

      <label>Prefisso PDF</label>
      <input type="text" id="deadlinePrefixInput" placeholder="Es. internet">
    </div>

    <div id="deadlineListBox"></div>

    <div class="deadlineButtons">
      <button id="saveDeadlineBtn" class="primaryBtn">Salva scadenza</button>
      <button id="replaceDeadlinesBtn" class="secondaryBtn">Sostituisci tutte</button>
      <button id="clearDeadlinesBtn" class="dangerBtn">Elimina scadenze</button>
    </div>
  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
